body:
  text: 附録以下各篇據嚴可均輯本輯仕宦期四十左右作尚書郎即抽簪高邁今三十六方作奉朝請頭顱可知不如早去本集疇昔之意不願處人間年登四十畢志山藪今已三十六矣時不我借知幾其神乎毋為自苦也本集夫仰鏡玄精覩景耀之巨細俯盼平區見巖海之崇深搜訪人綱究朝班之品序研綜天經測真靈之階業但名爵隱顯學號進退四宮之內疑似相參今正當比類經正讎校儀服埒其高卑區其宮域又有指目單位略説姓名或任同秩異業均迹別者如希林真人為太微右公而領九宮上相未委為北宴上清當下親相職邪諸如此類難可必證謂其並繼所領而從高域粗事事條辨略宣後章輒以淺識下生輕品上聖升降失序梯級乖本懼貽謫玄府絡咎冥司今所詮貫者實稟注之奧旨存向之要趣祈祝跪請宜委位序之尊卑對真接異必究所遇之輕重雖同號真人真品乃有數俱目仙人仙亦有等級千億若不精委條領略識宗源者猶如野夫出朝廷見朱衣必令史句驪入中國呼一切為參軍豈解士庶之貴賤辨爵號之異同乎本集鶴壽不知其紀也壬辰歲得於華亭甲午歲化於朱方天其未遂吾翔寥廓耶奚奪我仙鶴之遽也乃裹以玄黃之幣藏乎茲山之下仙家無隱我故立石旌事篆銘不朽詞曰相此胎禽浮丘著經余欲無言爾也何明雷門去鼓華表留形義唯髣佛事亦微冥爾將何之解化西竹法里厥土惟寧後蕩洪流前固重扃左取曹國右割山陰爽塏勢掩華亭爰集真侶瘞爾作銘碑拓本又汪士鋐瘞鶴銘考既沒不須沐浴不須施床止兩重席於地因所著舊衣上加生裓裙及臂衣靺冠法服左肘録鈴右肘藥鈴佩符絡左肘下繞腰穿環結於前叉符於髻上通以大袈裟覆衾蒙首足明器有車馬道人道士並在門中道人左道士右百日內夜常然燈旦常香火南史七十六陶弘景傳
